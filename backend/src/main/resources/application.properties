spring.application.name=backend

# ============================================
# DATABASE CONFIGURATION (LOCAL MYSQL)
# ============================================
# This is the DEFAULT configuration for local development
# Production/Railway configuration is in application-production.properties

spring.datasource.url=jdbc:mysql://localhost:3306/ai_interview_simulator
spring.datasource.username=root
spring.datasource.password=mani@1525
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.database=mysql

# API Keys (set in .env for local development)
groq.api.key=${GROQ_API_KEY:your_groq_api_key}
gemini.api.key=${GEMINI_API_KEY:your_gemini_api_key}

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Logging
logging.level.root=INFO
logging.level.com.aisimulator=DEBUG