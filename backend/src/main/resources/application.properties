spring.application.name=backend

# ============================================
# DATABASE CONFIGURATION (AUTO-DETECT ENVIRONMENT)
# ============================================

# If DATABASE_URL is set (Railway), use PostgreSQL; otherwise use MySQL (local)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/ai_interview_simulator}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:mani@1525}

# Auto-detect driver based on URL or environment
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL:update}
spring.jpa.show-sql=true
spring.jpa.database-platform=${HIBERNATE_DIALECT:org.hibernate.dialect.MySQL8Dialect}

# PostgreSQL specific (when on Railway)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}

# API Keys (set in .env for local development, Railway environment variables otherwise)
groq.api.key=${GROQ_API_KEY:your_groq_api_key}
gemini.api.key=${GEMINI_API_KEY:your_gemini_api_key}

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/api

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Logging
logging.level.root=INFO
logging.level.com.aisimulator=DEBUG