spring.application.name=backend

# ============================================
# RAILWAY PRODUCTION CONFIGURATION
# ============================================
# DataSource is configured in DataSourceConfig.java which parses DATABASE_URL
# This file contains Hibernate/JPA and application-level settings only

# JPA/Hibernate Configuration for PostgreSQL
spring.jpa.database=postgresql
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL10Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.jdbc.fetch_size=50

# Logging for production (less verbose)
logging.level.root=WARN
logging.level.com.aisimulator=INFO
logging.level.org.springframework.boot=INFO

# Server Configuration
server.servlet.context-path=/api
server.tomcat.threads.max=10
server.error.include-message=always
server.error.include-stacktrace=never

# API Keys (from Railway environment variables)
groq.api.key=${GROQ_API_KEY:}
gemini.api.key=${GEMINI_API_KEY:}

